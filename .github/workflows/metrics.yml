name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Activity Compass
        run: node scripts/generate-activity-card.js
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GH_USERNAME: Nethmika4881

      - name: Commit metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update GitHub metrics"
